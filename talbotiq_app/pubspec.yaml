name: talbotiq
description: "AI powered interview application"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # Firebase — auth (email/password) + Firestore for the recruiter→candidate flow.
  # Run `flutterfire configure` to generate lib/firebase_options.dart and the
  # per-platform config; see lib/firebase_options.dart for the placeholder.
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4

  cupertino_icons: ^1.0.8
  provider: ^6.1.5+1
  http: ^1.6.0
  url_launcher: ^6.3.2
  intl: ^0.20.2
  webview_flutter: ^4.13.1
  webview_flutter_android: ^4.3.0
  webview_flutter_wkwebview: ^3.22.0
  permission_handler: ^11.3.1
  shared_preferences: ^2.5.5
  speech_to_text: ^7.4.0
  record: ^6.1.1
  path_provider: ^2.1.4
  audioplayers: ^6.1.0
  file_picker: ^11.0.2
  pdf: ^3.11.1
  printing: ^5.13.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo.jpg"

  # Android adaptive icon support
  adaptive_icon_foreground: "assets/logo.jpg"
  adaptive_icon_background: "#FFFFFF"